<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handball Tactique Expert V11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0f172a; touch-action: none; font-family: 'Segoe UI', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        #contextModal {
            position: absolute;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            padding: 12px;
            z-index: 1000;
            display: none;
            width: 220px;
        }
        .modal-btn {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 8px;
            font-size: 13px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

</head>
<body class="text-slate-200 select-none flex flex-col h-screen">

    <div id="contextModal">
        <div id="modalTitle" class="text-[10px] uppercase tracking-widest text-slate-400 mb-2 px-1">Édition</div>
        <div id="playerInputs" class="hidden">
            <input type="text" id="editNum" class="modal-input" placeholder="Numéro">
            <input type="text" id="editRole" class="modal-input" placeholder="Nom / Poste">
        </div>
        <div id="calibInputs" class="hidden">
            <input type="text" id="editLabel" class="modal-input" placeholder="Nom du repère">
        </div>
        
        <div id="modalActions">
            </div>
    </div>

    <!-- HEADER -->
    <header class="bg-slate-900 border-b border-slate-700 p-3 shadow-lg flex justify-between items-center shrink-0 z-20 flex-wrap gap-2">
        <div>
            <h1 class="text-xl font-black tracking-wide text-indigo-400">TACTIQUE <span class="text-white">V11.0</span></h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">Filtres Multi-Sports</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <button id="saveProjectBtn" class="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow hover:bg-emerald-700 transition-colors flex items-center gap-2" title="Sauvegarder et partager le projet">
                💾 Sauver
            </button>
            <label for="loadProjectInput" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow cursor-pointer hover:bg-blue-700 transition-colors flex items-center gap-2" title="Charger un projet">
                📂 Charger
            </label>
            <input type="file" id="loadProjectInput" accept=".json" class="hidden">
            
            <button id="exportPdfBtn" class="bg-red-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow hover:bg-red-700 transition-colors flex items-center gap-2" title="Exporter en PDF A4">
                📄 PDF
            </button>
            
            <div class="w-px h-8 bg-slate-700 mx-1 hidden sm:block"></div>

            <button id="teamsBtn" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow border border-slate-600 active:bg-slate-700 transition-colors flex items-center gap-2">
                👥 Équipes
            </button>
            <label for="imageUpload" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow cursor-pointer active:bg-indigo-700 transition-colors flex items-center gap-2">
                📷 Photo
            </label>
            <input type="file" id="imageUpload" accept="image/*" class="hidden">
            
            <button id="toggleDebugBtn" class="px-3 py-2 text-[10px] rounded-lg bg-slate-800 text-slate-400 border border-slate-700 hover:text-white transition-colors">🐞 Debug IA</button>

        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="flex-1 relative flex overflow-hidden">
        
        <!-- SIDEBAR GAUCHE (Correction du Z-Index z-[60] pour toujours être au-dessus de la map) -->
        <aside id="sidebar" class="w-64 bg-slate-900 border-r border-slate-700 flex flex-col z-[60] transition-transform duration-300 transform -translate-x-full absolute h-full md:relative md:translate-x-0 shadow-2xl">
            <div class="p-3 border-b border-slate-700 flex justify-between items-center bg-slate-800">
                <span class="font-bold text-sm uppercase tracking-wider text-slate-300">Banc de touche</span>
                <button id="closeSidebarBtn" class=" md:relative text-slate-400 hover:text-white p-2">✕</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3 flex flex-col gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <input type="color" id="colorTeamA" value="#ef4444" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <input type="text" id="nameTeamA" value="Locaux" class="bg-transparent border-b border-slate-600 text-sm font-bold text-white w-full focus:outline-none focus:border-indigo-500">
                    </div>
                    <div id="rosterA" class="grid grid-cols-2 gap-2"></div>
                </div>
                <div class="border-t border-slate-700"></div>
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <input type="color" id="colorTeamB" value="#3b82f6" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <input type="text" id="nameTeamB" value="Visiteurs" class="bg-transparent border-b border-slate-600 text-sm font-bold text-white w-full focus:outline-none focus:border-indigo-500">
                    </div>
                    <div id="rosterB" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>
        </aside>

        <!-- WORKSPACE (Canvas) -->
        <div id="workspace" class="flex-1 relative bg-slate-950">
            
            <canvas id="mainCanvas" class="absolute inset-0 w-full h-full touch-none"></canvas>
            <div class="absolute bottom-2 md:bottom-4 left-1/2 transform -translate-x-1/2 w-[95%] max-w-3xl bg-slate-900/90 backdrop-blur border border-slate-700 p-2 rounded-xl shadow-2xl flex flex-wrap justify-center gap-1.5 z-20">
            <!-- <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-900/90 backdrop-blur border border-slate-700 p-2 rounded-xl shadow-2xl flex gap-1 z-20 whitespace-nowrap"> -->
                <button id="modePanBtn" class="px-4 py-2 text-xs rounded-lg font-bold shadow text-white bg-slate-600 transition-colors">✋ Vue</button>
                <button id="modeCalibBtn" class="px-4 py-2 text-xs rounded-lg transition-colors text-slate-400 hover:text-white hover:bg-slate-800">📍 Repères</button>
                <button id="modePlayerBtn" class="px-4 py-2 text-xs rounded-lg transition-colors text-slate-400 hover:text-white hover:bg-slate-800">🏃 Joueurs</button>
                <button id="modeBallBtn" class="px-4 py-2 text-xs rounded-lg transition-colors text-slate-400 hover:text-white hover:bg-slate-800">🏀 Ballon</button>
                <button id="mobileSidebarBtn" class="md:hidden px-4 py-2 text-xs rounded-lg bg-indigo-600 text-white font-bold ml-2">👥 Joueurs</button>
                <button id="modeLinesBtn" class="px-4 py-2 text-xs rounded-lg transition-colors text-slate-400 hover:text-white hover:bg-slate-800" title="Afficher les lignes sur la photo">🗺️ Lignes 3D</button>
                <button id="modeDrawRunBtn" class="px-4 py-2 text-xs rounded-lg transition-colors text-slate-400 hover:text-white hover:bg-slate-800">🏃 Course</button>
                <button id="modeDrawPassBtn" class="px-4 py-2 text-xs rounded-lg transition-colors text-slate-400 hover:text-white hover:bg-slate-800">🏀 Passe</button>
                <button id="modeAutoBtn" class="px-4 py-2 text-xs rounded-lg transition-colors font-bold text-white bg-gradient-to-r from-purple-600 to-indigo-600 shadow hover:from-purple-500 hover:to-indigo-500 border border-purple-400">🪄 Auto IA</button>

            </div>

            

        </div>
        <!-- CARTE EN DIRECT -->
        <div id="liveMapPanel" class="absolute top-4 right-4 bg-slate-900/90 backdrop-blur border border-slate-700 p-2 rounded-2xl shadow-2xl z-40 flex flex-col shadow-[0_0_40px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-xs font-bold text-emerald-400 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Carte Active
                </span>
                <div class="flex gap-2 items-center">
                    <button id="toggleProjBtn" class="text-indigo-400 hover:text-indigo-300" title="Activer Projection">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                    <button id="flipMapBtn" class="text-slate-400 hover:text-white" title="Pivoter"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
                    <button id="expandMapBtn" class="text-slate-400 hover:text-white" title="Plein écran">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                    <button id="dockMapBtn" class="text-slate-400 hover:text-white" title="Ancrer à droite">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    </button>
                </div>
            </div>
            
            <!-- Panneau de Filtres (visible uniquement quand Modal Plein Écran) -->
            <div id="mapControls" class="hidden flex-wrap gap-2 mb-2 p-2 border-b border-slate-700 bg-slate-800/80 justify-center rounded-lg">
                <label class="cursor-pointer select-none">
                    <input type="checkbox" id="chkHand" checked class="peer sr-only">
                    <span class="px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 peer-checked:bg-slate-200 peer-checked:text-slate-900 peer-checked:border-slate-200 font-bold transition-colors">Handball</span>
                </label>
                <label class="cursor-pointer select-none">
                    <input type="checkbox" id="chkBasket" class="peer sr-only">
                    <span class="px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 peer-checked:bg-red-600 peer-checked:text-white peer-checked:border-red-600 font-bold transition-colors">Basket</span>
                </label>
                <label class="cursor-pointer select-none">
                    <input type="checkbox" id="chkVolley" class="peer sr-only">
                    <span class="px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 font-bold transition-colors">Volley</span>
                </label>
                <label class="cursor-pointer select-none">
                    <input type="checkbox" id="chkMinihand" class="peer sr-only">
                    <span class="px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 peer-checked:bg-yellow-500 peer-checked:text-white peer-checked:border-yellow-500 font-bold transition-colors">Mini-Hand</span>
                </label>
                <label class="cursor-pointer select-none">
                    <input type="checkbox" id="chkMinibasket" class="peer sr-only">
                    <span class="px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 peer-checked:bg-purple-500 peer-checked:text-white peer-checked:border-purple-500 font-bold transition-colors">Mini-Basket</span>
                </label>
            </div>

            <div id="mapContainerWrapper" class="relative w-[220px] h-[220px] rounded-xl overflow-hidden border border-slate-600 shadow-inner bg-[#e5a86d]">
                <canvas id="liveMapCanvas" class="absolute top-0 left-0 w-full h-full touch-none cursor-crosshair"></canvas>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. DONNÉES MÉTIER & ÉTAT
        // ==========================================

        const defaultRoster = [
            { num: '1', role: 'Gardien' }, { num: '2', role: 'Ailier G' }, { num: '3', role: 'Arrière G' },
            { num: '4', role: 'Demi-Centre' }, { num: '5', role: 'Pivot' }, { num: '6', role: 'Arrière D' }, { num: '7', role: 'Ailier D' }
        ];

        const ROSTER_TEMPLATE = [
            { num: '1', role: 'Gardien' }, { num: '2', role: 'Ailier G' }, { num: '3', role: 'Arrière G' },
            { num: '4', role: 'Demi-Centre' }, { num: '5', role: 'Pivot' }, { num: '6', role: 'Arrière D' }, { num: '7', role: 'Ailier D' }
        ];

        const state = {
            image: null,
            offscreenData: null, 
            offscreenScale: 1,
            view: { x: 0, y: 0, zoom: 1 },
            mapView: { x: 0, y: 0, zoom: 1 }, 
            mode: 'pan', 
            isMapFlipped: false,
            isMapExpanded: false, 
            showProjection: true, 
            raytraceDirty: true, 

            showLinesOnPhoto: false,

            // NOUVELLE STRUCTURE POUR LE DESSIN VECTORIEL
            trajectories: [], 
            dragPathHandle: null, // Pour savoir quel point de la courbe on modifie
            currentPath: null,
            
            // Les rosters sont maintenant intégrés aux équipes pour être sauvegardés !
            teams: { 
                A: { name: 'Locaux', color: '#ef4444', roster: JSON.parse(JSON.stringify(defaultRoster)) }, 
                B: { name: 'Visiteurs', color: '#3b82f6', roster: JSON.parse(JSON.stringify(defaultRoster)) } 
            },
            visibleSports: { hand: true, basket: false, volley: false, minihand: false, minibasket: false },
            
            // NOUVEAU : 6 points (4 au sol Z=0, et 2 en hauteur Z=2)
            calibPoints: [
                { id: 'c1', label: "Sol G", photoX: 0, photoY: 0, mapX: 8.5, mapY: 0, mapZ: 0, offX: -40, offY: -40 },
                { id: 'c2', label: "Sol D", photoX: 0, photoY: 0, mapX: 11.5, mapY: 0, mapZ: 0, offX: 40, offY: -40 },
                { id: 'c3', label: "6m D", photoX: 0, photoY: 0, mapX: 11.5, mapY: 6, mapZ: 0, offX: 40, offY: 40 },
                { id: 'c4', label: "6m G", photoX: 0, photoY: 0, mapX: 8.5, mapY: 6, mapZ: 0, offX: -40, offY: 40 },
                { id: 'c5', label: "Lucarne G", photoX: 0, photoY: 0, mapX: 8.5, mapY: 0, mapZ: 2, offX: -40, offY: -80 },
                { id: 'c6', label: "Lucarne D", photoX: 0, photoY: 0, mapX: 11.5, mapY: 0, mapZ: 2, offX: 40, offY: -80 }
            ],
            
            playersOnPitch: [],
            dragPhoto: null,
            dragMap: null,
            pointersPhoto: new Map(),
            pointersMap: new Map(),
            transforms: { photoToMap: null, mapToPhoto: null, mapToPhotoMatrix: null },

            ball: null, // stockera { photoX, photoY }
            ballCarrier: null, // stockera l'ID du joueur porteur
        };

        // ==========================================
        // 2. ÉLÉMENTS DOM & OPTIMISATION RAYTRACER
        // ==========================================
        const ui = {
            mainCanvas: document.getElementById('mainCanvas'),
            mapCanvas: document.getElementById('liveMapCanvas'),
            liveMapPanel: document.getElementById('liveMapPanel'),
            mapContainerWrapper: document.getElementById('mapContainerWrapper'),
            mapControls: document.getElementById('mapControls'),
            ctx: document.getElementById('mainCanvas').getContext('2d'),
            mapCtx: document.getElementById('liveMapCanvas').getContext('2d'),
            
            modePan: document.getElementById('modePanBtn'),
            modeCalib: document.getElementById('modeCalibBtn'),
            modePlayer: document.getElementById('modePlayerBtn'),
            
            sidebar: document.getElementById('sidebar'),
            teamsBtn: document.getElementById('teamsBtn'),
            mobileSidebarBtn: document.getElementById('mobileSidebarBtn'),
            closeSidebarBtn: document.getElementById('closeSidebarBtn'),
            
            flipMapBtn: document.getElementById('flipMapBtn'),
            toggleProjBtn: document.getElementById('toggleProjBtn'),
            expandMapBtn: document.getElementById('expandMapBtn'),

            modeBall: document.getElementById('modeBallBtn'),
            modeLinesBtn: document.getElementById('modeLinesBtn'),

            modeDrawRun: document.getElementById('modeDrawRunBtn'),
            modeDrawPass: document.getElementById('modeDrawPassBtn'),

            toggleDebugBtn: document.getElementById('toggleDebugBtn'),
        };

        const RAY_RES = 800; 
        const rayCanvas = document.createElement('canvas');
        rayCanvas.width = RAY_RES; rayCanvas.height = RAY_RES;
        const rayCtx = rayCanvas.getContext('2d', { willReadFrequently: true });
        const rayImgData = rayCtx.createImageData(RAY_RES, RAY_RES);

        // Liaison des filtres de ligne
        ['hand', 'basket', 'volley', 'minihand', 'minibasket'].forEach(sport => {
            const el = document.getElementById(`chk${sport.charAt(0).toUpperCase() + sport.slice(1)}`);
            if(el) {
                el.addEventListener('change', (e) => {
                    state.visibleSports[sport] = e.target.checked;
                    requestRender();
                });
            }
        });

        // ==========================================
        // 3. MOTEUR DE RENDU 
        // ==========================================
        let renderRequested = false;

        function requestRender() {
            if (!renderRequested) { 
                renderRequested = true; 
                requestAnimationFrame(renderAll); 
            }
        }

        function drawProjectedSports(ctx, transform) {
            if (!transform) return;
            
            // Épaisseur de ligne dynamique : reste fine même si on zoome fort sur l'image !
            const lw = 2.5 / state.view.zoom; 
            
            const pMove = (x, y) => { let p = transform(x, y); if(p) ctx.moveTo(p.x, p.y); };
            const pLine = (x, y) => { let p = transform(x, y); if(p) ctx.lineTo(p.x, p.y); };
            
            // Transforme un arc parfait en de multiples petits segments pour épouser la perspective 3D
            const pArcLine = (cx, cy, r, start, end, ccw) => {
                let steps = 40; 
                let range = end - start;
                if (ccw && range > 0) range -= 2 * Math.PI;
                if (!ccw && range < 0) range += 2 * Math.PI;
                for(let i=0; i<=steps; i++) {
                    let a = start + range * (i / steps);
                    pLine(cx + r * Math.cos(a), cy + r * Math.sin(a));
                }
            };

            ctx.save();
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            // --- HANDBALL ---
            if (state.visibleSports.hand) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)'; ctx.lineWidth = lw;
                ctx.beginPath();
                pMove(0,0); pLine(20,0); pLine(20,20); pLine(0,20); pLine(0,0); // Cadre du demi-terrain
                pMove(8.5, 0); pLine(8.5, -0.5); pLine(11.5, -0.5); pLine(11.5, 0); // But
                pMove(2.5, 0); pArcLine(8.5, 0, 6, Math.PI, Math.PI/2, true); pLine(11.5, 6); pArcLine(11.5, 0, 6, Math.PI/2, 0, true); // Zone 6m
                ctx.stroke();

                ctx.setLineDash([lw*3, lw*3]); ctx.beginPath(); // Pointillés pour les 9m
                pMove(8.5 - 9, 0); pArcLine(8.5, 0, 9, Math.PI, Math.PI/2, true); pLine(11.5, 9); pArcLine(11.5, 0, 9, Math.PI/2, 0, true); 
                ctx.stroke(); ctx.setLineDash([]);
                
                ctx.beginPath(); pMove(9.5, 7); pLine(10.5, 7); ctx.stroke(); // Jet de 7m
                ctx.beginPath(); pMove(9.85, 4); pLine(10.15, 4); ctx.stroke(); // Ligne 4m gardien
            }

            // --- BASKETBALL ---
            if (state.visibleSports.basket) {
                ctx.strokeStyle = 'rgba(220, 38, 38, 0.75)'; ctx.lineWidth = lw;
                let b = 6;
                ctx.beginPath();
                pMove(2.5, b); pLine(17.5, b); pLine(17.5, b+14); pLine(2.5, b+14); pLine(2.5, b); // Demi-terrain
                pMove(10-2.45, b); pLine(10+2.45, b); pLine(10+2.45, b+5.8); pLine(10-2.45, b+5.8); pLine(10-2.45, b); // Raquette
                ctx.stroke();

                ctx.beginPath(); pArcLine(10, b+5.8, 1.8, 0, Math.PI, false); ctx.stroke(); // Cercle LF haut
                ctx.setLineDash([lw*2, lw*2]); ctx.beginPath(); pArcLine(10, b+5.8, 1.8, 0, Math.PI, true); ctx.stroke(); ctx.setLineDash([]); // Cercle LF bas
                
                let hoopY = b + 1.575;
                ctx.beginPath(); pMove(3.4, b); pLine(3.4, b+2.99); pArcLine(10, hoopY, 6.75, 0.2113, Math.PI-0.2113, false); pLine(16.6, b); ctx.stroke(); // 3 pts
            }

            // --- VOLLEYBALL ---
            if (state.visibleSports.volley) {
                ctx.strokeStyle = 'rgba(37, 99, 235, 0.75)'; ctx.lineWidth = lw;
                ctx.beginPath(); pMove(5.5, 11); pLine(14.5, 11); pLine(14.5, 20); pLine(5.5, 20); pLine(5.5, 11); ctx.stroke();
                ctx.beginPath(); pMove(5.5, 17); pLine(14.5, 17); ctx.stroke(); // Ligne 3m
            }

            ctx.restore();
        }

        function renderAll() {
            renderRequested = false;
            updateTransforms();
            
            const ctx = ui.ctx;
            const cvs = ui.mainCanvas;
            const dpr = window.devicePixelRatio || 1;
    
            // On met à l'échelle le contexte
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            
            ctx.fillStyle = '#0f172a';
            // On divise par dpr pour remplir la taille CSS logique
            ctx.fillRect(0, 0, cvs.width / dpr, cvs.height / dpr);
            
            if (state.image) {
                ctx.save();
                ctx.translate(state.view.x, state.view.y);
                ctx.scale(state.view.zoom, state.view.zoom);
                ctx.drawImage(state.image, 0, 0);
                
                // --- Dessin des lignes en perspective ---
                if (state.showLinesOnPhoto && state.transforms.mapToPhoto) {
                    drawProjectedSports(ctx, state.transforms.mapToPhoto);
                }

                // ==========================================
                // AFFICHAGE DU DEBUG VISUEL DE L'IA
                // ==========================================
                if (state.showAiDebug) {
                    state.playersOnPitch.forEach(p => {
                        // console.log("Debug data pour joueur:", p.debug); // Décommentez pour vérifier dans F12
                        
                        if (p.debug) {
                            const lw = 2 / state.view.zoom; // Garde une épaisseur visible
                            
                            // 1. La Bounding Box (Cyan)
                            if (p.debug.bbox) {
                                ctx.strokeStyle = '#06b6d4'; // Cyan
                                ctx.lineWidth = lw;
                                ctx.strokeRect(p.debug.bbox[0], p.debug.bbox[1], p.debug.bbox[2], p.debug.bbox[3]);
                            }

                            // 2. Le Patch de Couleur (Jaune + Remplissage de la couleur trouvée)
                            if (p.debug.patch && p.debug.color) {
                                ctx.strokeStyle = '#eab308'; // Jaune
                                ctx.lineWidth = lw;
                                ctx.fillStyle = `rgb(${p.debug.color[0]}, ${p.debug.color[1]}, ${p.debug.color[2]})`;
                                ctx.beginPath();
                                ctx.rect(p.debug.patch.x - p.debug.patch.r, p.debug.patch.y - p.debug.patch.r, p.debug.patch.r * 2, p.debug.patch.r * 2);
                                ctx.fill();
                                ctx.stroke();
                            }

                            // 3. Le Squelette (Rouge)
                            if (p.debug.keypoints) {
                                ctx.fillStyle = '#ef4444'; // Rouge
                                p.debug.keypoints.forEach(k => {
                                    if (k.score > 0.15) {
                                        ctx.beginPath();
                                        ctx.arc(k.x, k.y, 4 / state.view.zoom, 0, Math.PI * 2);
                                        ctx.fill();
                                    }
                                });
                            }
                        }
                    })
                };

                ctx.restore();
            }
            

            const drawItem = (pt, isCalib) => {
                if (state.mode === 'calib' && !isCalib) ctx.globalAlpha = 0.3;
                else if (state.mode === 'player' && isCalib) ctx.globalAlpha = 0.3;
                else ctx.globalAlpha = 1.0;

                const scTarget = worldToScreen(pt.photoX, pt.photoY);
                const scLabel = { x: scTarget.x + pt.offX, y: scTarget.y + pt.offY };
                const color = isCalib ? '#f59e0b' : state.teams[pt.team].color;
                const isHovered = state.dragPhoto && state.dragPhoto.obj === pt;

                ctx.beginPath(); ctx.moveTo(scTarget.x, scTarget.y); ctx.lineTo(scLabel.x, scLabel.y);
                ctx.strokeStyle = isHovered ? color : 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);

                ctx.beginPath(); ctx.arc(scTarget.x, scTarget.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#0f172a'; ctx.stroke();
                
                if (isHovered && state.dragPhoto.type === 'target') {
                    ctx.beginPath(); ctx.arc(scTarget.x, scTarget.y, 10, 0, Math.PI * 2); ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.stroke();
                }

                ctx.font = 'bold 12px sans-serif';
                
                // --- NOUVEAU : Gestion Multiligne du texte ---
                let lines = [];
                if (isCalib) {
                    lines = [`Repère ${pt.label}`];
                } else {
                    const rawText = `${pt.num} - ${pt.role}`;
                    const words = rawText.split(' ');
                    let currentLine = words[0];
                    for (let i = 1; i < words.length; i++) {
                        let testLine = currentLine + ' ' + words[i];
                        // Retour à la ligne si la largeur dépasse 120 pixels
                        if (ctx.measureText(testLine).width > 120) { 
                            lines.push(currentLine);
                            currentLine = words[i];
                        } else {
                            currentLine = testLine;
                        }
                    }
                    lines.push(currentLine);
                }

                const lineHeight = 14;
                const boxH = (lines.length * lineHeight) + 8; // Hauteur dynamique
                
                let maxW = 0;
                lines.forEach(l => maxW = Math.max(maxW, ctx.measureText(l).width));
                const boxW = maxW + 16; // Largeur dynamique basée sur la ligne la plus longue

                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
                ctx.fillStyle = isCalib ? '#1e293b' : color;
                if (isHovered && state.dragPhoto && state.dragPhoto.type === 'label') ctx.fillStyle = color;
                
                // Dessin du fond de l'étiquette
                ctx.beginPath(); ctx.roundRect(scLabel.x - boxW/2, scLabel.y - boxH/2, boxW, boxH, 6); ctx.fill();
                if (isCalib) { ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke(); }
                ctx.shadowColor = 'transparent';

                // Dessin des lignes de texte
                ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const startY = scLabel.y - boxH/2 + 4 + lineHeight/2; // Calcul du point de départ Y
                lines.forEach((line, i) => {
                    ctx.fillText(line, scLabel.x, startY + (i * lineHeight));
                });
                
                ctx.globalAlpha = 1.0;
            };

            state.calibPoints.forEach(p => drawItem(p, true));
            state.playersOnPitch.forEach(p => drawItem(p, false));

            // --- NOUVEAU : Rendu du Ballon sur la photo ---
            if (state.ball) {
                let bx, by;
                if (state.ballCarrier) {
                    const carrier = state.playersOnPitch.find(p => p.id === state.ballCarrier);
                    if (carrier) {
                        const scT = worldToScreen(carrier.photoX, carrier.photoY);
                        bx = scT.x + 12; // On place le ballon à côté du joueur
                        by = scT.y - 12;
                        
                        // Aura jaune autour du porteur de balle
                        ctx.beginPath();
                        ctx.arc(scT.x, scT.y, 14, 0, Math.PI * 2);
                        ctx.strokeStyle = '#facc15'; // yellow-400
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    } else {
                        state.ballCarrier = null; // Sécurité si le joueur a été supprimé
                    }
                } 
                if (!state.ballCarrier) {
                    const scB = worldToScreen(state.ball.photoX, state.ball.photoY);
                    bx = scB.x; by = scB.y;
                }
                
                // Dessin du ballon (cercle orange vif)
                ctx.beginPath();
                ctx.arc(bx, by, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#f97316'; // orange-500
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = '#000';
                ctx.stroke();
            }

            // --- DESSIN DES TRAJECTOIRES VECTORIELLES SUR PHOTO ---
            const drawPhotoVectorPath = (t) => {
                if (!state.transforms.mapToPhoto) return;
                
                // Fonction pour échantillonner la courbe de Bézier (20 étapes)
                const steps = 20;
                let screenPts = [];
                for (let i = 0; i <= steps; i++) {
                    let u = i / steps, u1 = 1 - u;
                    let lx = u1*u1*t.p0.x + 2*u1*u*t.p1.x + u*u*t.p2.x;
                    let ly = u1*u1*t.p0.y + 2*u1*u*t.p1.y + u*u*t.p2.y;
                    
                    const photoPos = state.transforms.mapToPhoto(lx, ly);
                    if (photoPos) screenPts.push(worldToScreen(photoPos.x, photoPos.y));
                }

                if (screenPts.length < 2) return;

                ctx.beginPath();
                ctx.strokeStyle = t.color;
                ctx.lineWidth = 3;
                if (t.type === 'pass') ctx.setLineDash([8, 8]); // Pointillés en perspective
                
                ctx.moveTo(screenPts[0].x, screenPts[0].y);
                for (let i = 1; i < screenPts.length; i++) ctx.lineTo(screenPts[i].x, screenPts[i].y);
                ctx.stroke(); ctx.setLineDash([]);

                // Pointe de la flèche (basée sur les deux derniers points calculés)
                let pA = screenPts[screenPts.length - 2], pB = screenPts[screenPts.length - 1];
                let angle = Math.atan2(pB.y - pA.y, pB.x - pA.x);
                ctx.beginPath();
                ctx.moveTo(pB.x, pB.y); ctx.lineTo(pB.x - 15 * Math.cos(angle - 0.5), pB.y - 15 * Math.sin(angle - 0.5));
                ctx.moveTo(pB.x, pB.y); ctx.lineTo(pB.x - 15 * Math.cos(angle + 0.5), pB.y - 15 * Math.sin(angle + 0.5));
                ctx.stroke();
            };

            state.trajectories.forEach(t => drawPhotoVectorPath(t));
            if (state.currentPath) drawPhotoVectorPath(state.currentPath);

            renderMap();
        }

        function renderMap() {
            const mCtx = ui.mapCtx;const dpr = window.devicePixelRatio || 1;
            
            // On met à l'échelle le contexte
            mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            
            // On récupère la taille logique pour les calculs de la minimap
            const cw = ui.mapCanvas.width / dpr;
            const ch = ui.mapCanvas.height / dpr;
            
            const size = Math.min(cw, ch);
            const scale = size / 20;
            const cx = (cw - size) / 2;
            const cy = (ch - size) / 2;

            mCtx.clearRect(0, 0, cw, ch);
            mCtx.fillStyle = '#e5a86d'; 
            mCtx.fillRect(0, 0, cw, ch);

            // CORRECTION: Génération d'un rendu toujours "à l'endroit" logiquement
            if (state.showProjection && state.transforms.mapToPhotoMatrix && state.offscreenData) {
                if (state.raytraceDirty) {
                    const outD = rayImgData.data;
                    const inD = state.offscreenData.data;
                    const inW = state.offscreenData.width;
                    const inH = state.offscreenData.height;
                    const offS = state.offscreenScale;
                    const h = state.transforms.mapToPhotoMatrix;
                    const invScale = 20 / RAY_RES;

                    for (let y = 0; y < RAY_RES; y++) {
                        for (let x = 0; x < RAY_RES; x++) {
                            let outIdx = (y * RAY_RES + x) << 2;
                            outD[outIdx] = 229; outD[outIdx+1] = 168; outD[outIdx+2] = 109; outD[outIdx+3] = 255;
                            
                            // On ne fait plus d'inversion mathématique isMapFlipped ici !
                            let lx = x * invScale, ly = y * invScale; 
                            
                            let denom = h[6] * lx + h[7] * ly + 1;
                            if (denom <= 0.0001) continue; 
                            
                            let px = (h[0] * lx + h[1] * ly + h[2]) / denom;
                            let py = (h[3] * lx + h[4] * ly + h[5]) / denom;
                            
                            let ox = (px * offS) | 0, oy = (py * offS) | 0;
                            
                            if (ox >= 0 && ox < inW && oy >= 0 && oy < inH) {
                                let inIdx = (oy * inW + ox) << 2;
                                outD[outIdx]   = (inD[inIdx] * 0.75 + 229 * 0.25) | 0;
                                outD[outIdx+1] = (inD[inIdx+1] * 0.75 + 168 * 0.25) | 0;
                                outD[outIdx+2] = (inD[inIdx+2] * 0.75 + 109 * 0.25) | 0;
                            }
                        }
                    }
                    rayCtx.putImageData(rayImgData, 0, 0);
                    state.raytraceDirty = false;
                }
            }

            mCtx.save();
            // Appliquer Pan et Zoom interactif de la minimap
            mCtx.translate(cx + state.mapView.x, cy + state.mapView.y);
            mCtx.scale(state.mapView.zoom, state.mapView.zoom);

            // CORRECTION : La rotation du Context pivote tout d'un coup (vecteurs ET raytracing)
            if (state.isMapFlipped) { mCtx.translate(size/2, size/2); mCtx.rotate(Math.PI); mCtx.translate(-size/2, -size/2); }

            // Dessin projection 3D depuis le buffer HR
            if (state.showProjection && state.transforms.mapToPhotoMatrix && state.offscreenData) {
                mCtx.drawImage(rayCanvas, 0, 0, RAY_RES, RAY_RES, 0, 0, size, size);
            }

            // --- 1. HANDBALL ---
            if (state.visibleSports.hand) {
                mCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)'; mCtx.lineWidth = 2;
                mCtx.strokeRect(0, 0, size, size);
                mCtx.fillStyle = 'rgba(255,255,255,0.4)'; 
                // CORRECTION : On positionne la cage à -0.5 pour qu'elle sorte du terrain !
                mCtx.fillRect(8.5 * scale, -0.5 * scale, 3 * scale, 0.5 * scale); 
                mCtx.strokeRect(8.5 * scale, -0.5 * scale, 3 * scale, 0.5 * scale);
                mCtx.beginPath(); mCtx.arc(8.5*scale, 0, 6*scale, Math.PI, Math.PI/2, true); mCtx.lineTo(11.5*scale, 6*scale); mCtx.arc(11.5*scale, 0, 6*scale, Math.PI/2, 0, true); mCtx.stroke(); 
                mCtx.setLineDash([4, 4]); mCtx.beginPath(); mCtx.arc(8.5*scale, 0, 9*scale, Math.PI, Math.PI/2, true); mCtx.lineTo(11.5*scale, 9*scale); mCtx.arc(11.5*scale, 0, 9*scale, Math.PI/2, 0, true); mCtx.stroke(); 
                mCtx.setLineDash([]); mCtx.beginPath(); mCtx.moveTo(9.5*scale, 7*scale); mCtx.lineTo(10.5*scale, 7*scale); mCtx.stroke(); 
                mCtx.beginPath(); mCtx.moveTo(9.85*scale, 4*scale); mCtx.lineTo(10.15*scale, 4*scale); mCtx.stroke(); 



            }

            // --- 2. BASKETBALL ---
            if (state.visibleSports.basket) {
                mCtx.strokeStyle = 'rgba(220, 38, 38, 0.6)'; mCtx.lineWidth = 1.5;
                const baseB = 6 * scale;
                mCtx.strokeRect(2.5 * scale, baseB, 15 * scale, 14 * scale); 
                mCtx.strokeRect((10 - 2.45) * scale, baseB, 4.9 * scale, 5.8 * scale); 
                mCtx.beginPath(); mCtx.arc(10*scale, (6+5.8)*scale, 1.8*scale, 0, Math.PI, false); mCtx.stroke();
                mCtx.setLineDash([3,3]); mCtx.beginPath(); mCtx.arc(10*scale, (6+5.8)*scale, 1.8*scale, 0, Math.PI, true); mCtx.stroke(); mCtx.setLineDash([]);
                const hoopY = (6 + 1.575) * scale;
                mCtx.beginPath(); mCtx.moveTo(3.4*scale, baseB); mCtx.lineTo(3.4*scale, (6+2.99)*scale); 
                mCtx.arc(10*scale, hoopY, 6.75*scale, 0.2113, Math.PI-0.2113, false); 
                mCtx.lineTo(16.6*scale, baseB); mCtx.stroke(); 
            }

            // --- 3. VOLLEYBALL ---
            if (state.visibleSports.volley) {
                mCtx.strokeStyle = 'rgba(37, 99, 235, 0.6)'; mCtx.lineWidth = 1.5;
                mCtx.strokeRect(5.5*scale, 11*scale, 9*scale, 9*scale); 
                mCtx.beginPath(); mCtx.moveTo(5.5*scale, 17*scale); mCtx.lineTo(14.5*scale, 17*scale); mCtx.stroke(); 
            }

            // --- 4. MINI-HANDBALL ---
            if (state.visibleSports.minihand) {
                mCtx.strokeStyle = 'rgba(234, 179, 8, 0.7)'; mCtx.lineWidth = 1.5; mCtx.setLineDash([4, 4]); 
                mCtx.beginPath(); mCtx.moveTo(10*scale, 0); mCtx.lineTo(10*scale, 20*scale); mCtx.stroke();
                mCtx.beginPath(); mCtx.arc(0, 8.5*scale, 5*scale, -Math.PI/2, 0, false); mCtx.lineTo(5*scale, 11.5*scale); mCtx.arc(0, 11.5*scale, 5*scale, 0, Math.PI/2, false); mCtx.stroke();
                mCtx.beginPath(); mCtx.arc(20*scale, 8.5*scale, 5*scale, -Math.PI/2, Math.PI, true); mCtx.lineTo(15*scale, 11.5*scale); mCtx.arc(20*scale, 11.5*scale, 5*scale, Math.PI, Math.PI/2, true); mCtx.stroke();
                mCtx.setLineDash([]);
            }

            // --- 5. MINI-BASKET ---
            if (state.visibleSports.minibasket) {
                mCtx.strokeStyle = 'rgba(168, 85, 247, 0.7)'; mCtx.lineWidth = 1.5;
                mCtx.beginPath(); mCtx.moveTo(0, 2.5*scale); mCtx.lineTo(20*scale, 2.5*scale); mCtx.stroke();
                mCtx.beginPath(); mCtx.moveTo(0, 17.5*scale); mCtx.lineTo(20*scale, 17.5*scale); mCtx.stroke();
                mCtx.beginPath(); mCtx.arc(10*scale, 10*scale, 1.8*scale, 0, Math.PI*2); mCtx.stroke();
                mCtx.strokeRect(0, (10-2.45)*scale, 4*scale, 4.9*scale); mCtx.beginPath(); mCtx.arc(4*scale, 10*scale, 1.8*scale, -Math.PI/2, Math.PI/2); mCtx.stroke();
                mCtx.strokeRect((20-4)*scale, (10-2.45)*scale, 4*scale, 4.9*scale); mCtx.beginPath(); mCtx.arc((20-4)*scale, 10*scale, 1.8*scale, Math.PI/2, -Math.PI/2); mCtx.stroke();
            }

            mCtx.restore(); 

            const transform = state.transforms.photoToMap;
            const getMapScreen = (logicX, logicY) => {
                let mx = logicX * scale, my = logicY * scale;
                if (state.isMapFlipped) { mx = size - mx; my = size - my; }
                return { x: cx + state.mapView.x + mx * state.mapView.zoom, y: cy + state.mapView.y + my * state.mapView.zoom };
            };

            // Points de calibrage
            state.calibPoints.forEach((p, i) => {
                const sc = getMapScreen(p.mapX, p.mapY);
                mCtx.fillStyle = '#f59e0b'; mCtx.beginPath(); mCtx.arc(sc.x, sc.y, 7, 0, Math.PI * 2); mCtx.fill();
                mCtx.strokeStyle = 'white'; mCtx.lineWidth = 1.5; mCtx.stroke();
                mCtx.fillStyle = 'white'; mCtx.font = 'bold 10px sans-serif'; mCtx.textAlign = 'center'; mCtx.textBaseline = 'middle';
                mCtx.fillText(p.label, sc.x, sc.y);
            });

            if (!transform) {
                mCtx.fillStyle = 'rgba(0,0,0,0.6)'; mCtx.fillRect(0,0,cw,ch);
                mCtx.fillStyle = '#ef4444'; mCtx.font = 'bold 12px sans-serif'; mCtx.textAlign='center'; mCtx.fillText("Géométrie Invalide", cw/2, ch/2);
                return;
            }

            // Joueurs sur Minimap
            state.playersOnPitch.forEach(p => {
                let mPos = transform(p.photoX, p.photoY);
                if (!mPos) return;
                const sc = getMapScreen(mPos.x, mPos.y);
                
                mCtx.fillStyle = state.teams[p.team].color; mCtx.beginPath(); mCtx.arc(sc.x, sc.y, 6, 0, Math.PI*2); mCtx.fill();
                mCtx.strokeStyle = 'white'; mCtx.lineWidth = 1; mCtx.stroke();
                mCtx.fillStyle = 'white'; mCtx.font = 'bold 8px sans-serif'; mCtx.textAlign = 'center'; mCtx.textBaseline='middle';
                mCtx.fillText(p.num, sc.x, sc.y);
            });

            // --- NOUVEAU : Rendu du ballon sur la Minimap ---
            if (state.ball && transform) {
                let mPos;
                if (state.ballCarrier) {
                    const carrier = state.playersOnPitch.find(p => p.id === state.ballCarrier);
                    if (carrier) mPos = transform(carrier.photoX, carrier.photoY);
                } else {
                    mPos = transform(state.ball.photoX, state.ball.photoY);
                }
                
                if (mPos) {
                    const sc = getMapScreen(mPos.x, mPos.y);
                    mCtx.beginPath();
                    const offset = state.ballCarrier ? 5 : 0; // Décalé si porté
                    mCtx.arc(sc.x + offset, sc.y - offset, 4, 0, Math.PI * 2);
                    mCtx.fillStyle = '#f97316';
                    mCtx.fill();
                    mCtx.lineWidth = 1;
                    mCtx.strokeStyle = '#000';
                    mCtx.stroke();
                }
            }

            // --- DESSIN DES TRAJECTOIRES VECTORIELLES SUR MINIMAP ---
            const drawMapVectorPath = (t, isDrawingMode) => {
                const s0 = getMapScreen(t.p0.x, t.p0.y);
                const s1 = getMapScreen(t.p1.x, t.p1.y);
                const s2 = getMapScreen(t.p2.x, t.p2.y);

                mCtx.beginPath();
                mCtx.strokeStyle = t.color;
                mCtx.lineWidth = 3;
                if (t.type === 'pass') mCtx.setLineDash([6, 6]);

                mCtx.moveTo(s0.x, s0.y);
                mCtx.quadraticCurveTo(s1.x, s1.y, s2.x, s2.y);
                mCtx.stroke(); mCtx.setLineDash([]);

                // Pointe de la flèche (Tangente à l'arrivée)
                let dx = s2.x - s1.x; let dy = s2.y - s1.y;
                if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) { dx = s2.x - s0.x; dy = s2.y - s0.y; } // Securité
                let angle = Math.atan2(dy, dx);
                
                mCtx.beginPath();
                mCtx.moveTo(s2.x, s2.y); mCtx.lineTo(s2.x - 12 * Math.cos(angle - 0.5), s2.y - 12 * Math.sin(angle - 0.5));
                mCtx.moveTo(s2.x, s2.y); mCtx.lineTo(s2.x - 12 * Math.cos(angle + 0.5), s2.y - 12 * Math.sin(angle + 0.5));
                mCtx.stroke();

                // Si on est en mode édition, on dessine les poignées !
                if (isDrawingMode) {
                    mCtx.strokeStyle = 'rgba(255,255,255,0.4)'; mCtx.lineWidth = 1; mCtx.setLineDash([2, 2]);
                    mCtx.beginPath(); mCtx.moveTo(s0.x, s0.y); mCtx.lineTo(s1.x, s1.y); mCtx.lineTo(s2.x, s2.y); mCtx.stroke(); mCtx.setLineDash([]);
                    
                    const drawHandle = (pos, c) => { mCtx.beginPath(); mCtx.arc(pos.x, pos.y, 4, 0, Math.PI*2); mCtx.fillStyle = c; mCtx.fill(); mCtx.stroke(); };
                    drawHandle(s0, '#22c55e'); // Vert pour le départ
                    drawHandle(s2, '#ef4444'); // Rouge pour l'arrivée
                    drawHandle(s1, '#3b82f6'); // Bleu pour la courbure centrale
                }
            };

            const isDrawUI = state.mode === 'drawRun' || state.mode === 'drawPass';
            state.trajectories.forEach(t => drawMapVectorPath(t, isDrawUI));
            if (state.currentPath) drawMapVectorPath(state.currentPath, true);

        }

        // ==========================================
        // 4. UI & LOGIQUE DE REDIMENSIONNEMENT
        // ==========================================

        // Nouvel état
        state.isMapDocked = false;

        const dockMapBtn = document.getElementById('dockMapBtn');

        dockMapBtn.addEventListener('click', () => {
            state.isMapDocked = !state.isMapDocked;
            
            // Si la carte était en plein écran, on annule le plein écran d'abord
            // if (state.isMapExpanded) {
            //     ui.expandMapBtn.click(); 
            // }

            if (state.isMapDocked) {
                // --- MODE ANCRÉ (Docked) ---
                // On retire l'aspect flottant
                ui.liveMapPanel.classList.remove('absolute', 'top-4', 'right-4', 'rounded-2xl', 'shadow-[0_0_40px_rgba(0,0,0,0.5)]');

                    state.calibPoints[2].photoX = cx + s; state.calibPoints[2].photoY = cy + s*2; // 6m D
                    state.calibPoints[3].photoX = cx - s; state.calibPoints[3].photoY = cy + s*2; // 6m G
                    if(state.calibPoints[4]) { // Sécurité pour les anciens projets sauvegardés
                        state.calibPoints[4].photoX = cx - s; state.calibPoints[4].photoY = cy - s; // Lucarne G

        // ==========================================
        // 5. MATHS & TRANSFORMATIONS (SOLVEUR 3D BEST FIT)
        // ==========================================
        function worldToScreen(wx, wy) { return { x: wx * state.view.zoom + state.view.x, y: wy * state.view.zoom + state.view.y }; }
        function screenToWorld(sx, sy) { return { x: (sx - state.view.x) / state.view.zoom, y: (sy - state.view.y) / state.view.zoom }; }

        // --- Moteur de calcul Matriciel Pur JS ---
        const MathUtil = {
            transpose: (M) => M[0].map((_, c) => M.map(r => r[c])),
            multiply: (A, B) => {
                let isVector = !Array.isArray(B[0]);
                let B_mat = isVector ? B.map(v => [v]) : B;
                let res = A.map(row => B_mat[0].map((_, j) => row.reduce((sum, val, i) => sum + val * B_mat[i][j], 0)));
                return isVector ? res.map(row => row[0]) : res;
            },
            invert: (M) => { // Algorithme de Gauss-Jordan
                let n = M.length, A = M.map(r => [...r]), I = Array(n).fill(0).map((_, i) => Array(n).fill(0).map((_, j) => i === j ? 1 : 0));
                for (let i = 0; i < n; i++) {
                    let maxEl = Math.abs(A[i][i]), maxRow = i;
                    for (let k = i + 1; k < n; k++) if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
                    if (maxEl === 0) return null; 
                    [A[i], A[maxRow]] = [A[maxRow], A[i]];
                    [I[i], I[maxRow]] = [I[maxRow], I[i]];
                    let pivot = A[i][i];
                    for (let j = 0; j < n; j++) { A[i][j] /= pivot; I[i][j] /= pivot; }
                    for (let k = 0; k < n; k++) {
                        if (k !== i) {
                            let factor = A[k][i];
                            for (let j = 0; j < n; j++) { A[k][j] -= factor * A[i][j]; I[k][j] -= factor * I[i][j]; }
                        }
                    }
                }
                return I;
            },
            solveLeastSquares: (A, B) => {
                let At = MathUtil.transpose(A);
                let AtA_inv = MathUtil.invert(MathUtil.multiply(At, A));
                return AtA_inv ? MathUtil.multiply(AtA_inv, MathUtil.multiply(At, B)) : null;
            }
        };

        // Raccourci algébrique pour inverser l'Homographie (Évite un 2ème calcul lourd)
        function invertHomography(h) {
            let det22 = h[0]*h[4] - h[1]*h[3];
            if (Math.abs(det22) < 1e-10) return null; 
            return [
                (h[4] - h[5]*h[7]) / det22, (h[2]*h[7] - h[1]) / det22, (h[1]*h[5] - h[2]*h[4]) / det22,
                (h[5]*h[6] - h[3]) / det22, (h[0] - h[2]*h[6]) / det22, (h[2]*h[3] - h[0]*h[5]) / det22,
                (h[3]*h[7] - h[4]*h[6]) / det22, (h[1]*h[6] - h[0]*h[7]) / det22
            ];
        }

        // --- Le "Best Fit" (Gère Dynamiquement la 2D et la 3D avec Normalisation) ---
        function getBestFitTransform(src, dst) {
            let points3D = src.filter(p => p.z && Math.abs(p.z) > 0.001);
            let A = [], B = [];
            
            // LE FIX EST ICI : Normalisation des échelles pour la stabilité numérique !
            // Évite que des pixels comme 3000^2 fassent exploser la précision de la matrice.
            const scalePhoto = 1000.0; 
            
            // Si on a 6 points et qu'on a des points en hauteur (Z=2)
            if (src.length >= 6 && points3D.length > 0) {
                // Équations DLT 3D
                for (let i = 0; i < src.length; i++) {
                    let X = src[i].x, Y = src[i].y, Z = src[i].z || 0;
                    let u = dst[i].x / scalePhoto, v = dst[i].y / scalePhoto;
                    A.push([X, Y, Z, 1, 0, 0, 0, 0, -X*u, -Y*u, -Z*u]); B.push(u);
                    A.push([0, 0, 0, 0, X, Y, Z, 1, -X*v, -Y*v, -Z*v]); B.push(v);
                }
                let p = MathUtil.solveLeastSquares(A, B);
                if (!p) return null;
                // Le tour de magie : on extrait la matrice 2D du plan Z=0 et on dé-normalise
                return [
                    p[0] * scalePhoto, p[1] * scalePhoto, p[3] * scalePhoto,
                    p[4] * scalePhoto, p[5] * scalePhoto, p[7] * scalePhoto,
                    p[8], p[9]
                ];
            } else {
                // Fallback 2D Sécurisé
                for (let i = 0; i < src.length; i++) {
                    if (src[i].z && Math.abs(src[i].z) > 0.001) continue;
                    let X = src[i].x, Y = src[i].y;
                    let u = dst[i].x / scalePhoto, v = dst[i].y / scalePhoto;
                    A.push([X, Y, 1, 0, 0, 0, -X*u, -Y*u]); B.push(u);
                    A.push([0, 0, 0, X, Y, 1, -X*v, -Y*v]); B.push(v);
                }
                if (A.length < 8) return null;
                let p = MathUtil.solveLeastSquares(A, B);
                if (!p) return null;
                return [
                    p[0] * scalePhoto, p[1] * scalePhoto, p[2] * scalePhoto,
                    p[3] * scalePhoto, p[4] * scalePhoto, p[5] * scalePhoto,
                    p[6], p[7]
                ];
            }
        }

        function buildTransformFunc(matrix) {
            if (!matrix) return null;
            return function(x, y) {
                let denom = matrix[6] * x + matrix[7] * y + 1;
                return { x: (matrix[0] * x + matrix[1] * y + matrix[2]) / denom, y: (matrix[3] * x + matrix[4] * y + matrix[5]) / denom };
            };
        }

        function updateTransforms() {
            const photoPoints = state.calibPoints.map(p => ({ x: p.photoX, y: p.photoY }));
            const mapPoints = state.calibPoints.map(p => ({ x: p.mapX, y: p.mapY, z: p.mapZ || 0 }));
            
            // 1. Calcul de la projection Minimap -> Photo
            state.transforms.mapToPhotoMatrix = getBestFitTransform(mapPoints, photoPoints);
            
            if (state.transforms.mapToPhotoMatrix) {
                // 2. Inversion Mathématique pure pour Photo -> Minimap (Z=0)
                const photoToMapMatrix = invertHomography(state.transforms.mapToPhotoMatrix);
                state.transforms.mapToPhoto = buildTransformFunc(state.transforms.mapToPhotoMatrix);
                state.transforms.photoToMap = buildTransformFunc(photoToMapMatrix);
            } else {
                state.transforms.mapToPhoto = null;
                state.transforms.photoToMap = null;
            }
        }


        // ==========================================
        // 5.5 PIPELINE IA MODULAIRE (100% Edge Computing)
        // ==========================================
        
        // Conversion RGB (0-255) vers HSV (0-1)
        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, v = max;
            const d = max - min;
            s = max === 0 ? 0 : d / max;
            if (max === min) {
                h = 0; // achromatique
            } else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h, s, v];
        }

        const KMeans = {
            // Distance pondérée en espace HSV
            colorDist: function(hsv1, hsv2) {
                // On calcule la différence de teinte sur un cercle (0 et 1 sont proches)
                let dh = Math.min(Math.abs(hsv1[0] - hsv2[0]), 1 - Math.abs(hsv1[0] - hsv2[0]));
                let ds = hsv1[1] - hsv2[1];
                let dv = hsv1[2] - hsv2[2];

                // PONDÉRATION : La teinte (dh) est 8 fois plus importante que la luminosité (dv)
                return Math.sqrt((dh * 8) ** 2 + (ds * 2) ** 2 + (dv * 0.5) ** 2);
            },

            cluster: function(data, k, maxIterations = 15) {
                if (data.length === 0) return [];
                
                // Convertir toutes les couleurs extraites en HSV avant de travailler
                data.forEach(d => {
                    if (!d.hsv) d.hsv = rgbToHsv(d.color[0], d.color[1], d.color[2]);
                });

                // Initialisation : trouver les deux teintes les plus opposées
                let c1 = data[0].hsv, c2 = data[data.length-1].hsv;
                let maxD = -1;
                for(let i=0; i<data.length; i++) {
                    for(let j=i+1; j<data.length; j++) {
                        let d = this.colorDist(data[i].hsv, data[j].hsv);
                        if(d > maxD) { maxD = d; c1 = data[i].hsv; c2 = data[j].hsv; }
                    }
                }
                let centroids = [c1, c2];
                let assignments = new Array(data.length).fill(0);
                let changed = true;
                let iterations = 0;

                while (changed && iterations < maxIterations) {
                    changed = false; iterations++;
                    
                    for (let i = 0; i < data.length; i++) {
                        let minDist = Infinity;
                        let bestCluster = 0;
                        for (let c = 0; c < k; c++) {
                            let dist = this.colorDist(data[i].hsv, centroids[c]);
                            if (dist < minDist) { minDist = dist; bestCluster = c; }
                        }
                        if (assignments[i] !== bestCluster) { assignments[i] = bestCluster; changed = true; }
                    }

                    // Recalcul des centres HSV
                    let newCentroids = Array.from({length: k}, () => [0,0,0]);
                    let counts = new Array(k).fill(0);
                    for (let i = 0; i < data.length; i++) {
                        let cluster = assignments[i];
                        newCentroids[cluster][0] += data[i].hsv[0];
                        newCentroids[cluster][1] += data[i].hsv[1];
                        newCentroids[cluster][2] += data[i].hsv[2];
                        counts[cluster]++;
                    }
                    for (let c = 0; c < k; c++) {
                        if (counts[c] > 0) {
                            centroids[c] = [newCentroids[c][0]/counts[c], newCentroids[c][1]/counts[c], newCentroids[c][2]/counts[c]];
                        }
                    }
                }
                return { assignments };
            }
        };

        // --- Le Moteur du Pipeline ---
        const AIPipeline = {
            modules: [],
            
            // Permet d'ajouter des étapes (Ex: Pose, puis Clustering, puis Tracking...)
            addModule: function(module) {
                this.modules.push(module);
            },
            
            // Exécute la chaîne
            run: async function(context) {
                console.log("🚀 Démarrage du Pipeline IA...");
                for (let module of this.modules) {
                    console.log(`⏳ Exécution du module : ${module.name}`);
                    await module.execute(context);
                }
                console.log("✅ Pipeline IA terminé !");
                return context;
            }
        };

        // --- MODULE 1 : Approche "Top-Down" (Détection Bounding Box -> Zoom -> Squelette) ---
        const TopDownPoseModule = {
            name: "Top-Down Pose (COCO-SSD + MoveNet SinglePose)",
            personDetector: null,
            poseDetector: null,
            
            init: async function() {
                // 1. Modèle pour trouver les boîtes (ultra robuste aux basses résolutions)
                if (!this.personDetector) {
                    this.personDetector = await cocoSsd.load({base: 'lite_mobilenet_v2'}); 
                }
                // 2. Modèle pour trouver le squelette DANS la boîte zoomée
                if (!this.poseDetector) {
                    const detectorConfig = { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING };
                    this.poseDetector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, detectorConfig);
                }
            },

            execute: async function(context) {
                await this.init();
                context.detectedPlayers = [];

                // ÉTAPE 1 : Détecter toutes les personnes (Bounding Boxes)
                const predictions = await this.personDetector.detect(context.image);
                // On filtre pour ne garder que la classe 'person' avec un score raisonnable
                const persons = predictions.filter(p => p.class === 'person' && p.score > 0.2);

                console.log(`IA Étape 1 : COCO-SSD a trouvé ${persons.length} personnes.`);

                // Création d'un canvas caché pour faire nos "crops" virtuels
                const cropCanvas = document.createElement('canvas');
                const cropCtx = cropCanvas.getContext('2d', { willReadFrequently: true });

                // ÉTAPE 2 : Traiter chaque personne isolément
                for (let person of persons) {
                    // On ajoute une petite marge (10%) autour de la boîte pour être sûr de ne pas couper les pieds
                    const padX = person.bbox[2] * 0.1; 
                    const padY = person.bbox[3] * 0.1;
                    
                    let cx = Math.max(0, person.bbox[0] - padX);
                    let cy = Math.max(0, person.bbox[1] - padY);
                    let cw = Math.min(context.image.naturalWidth - cx, person.bbox[2] + padX * 2);
                    let ch = Math.min(context.image.naturalHeight - cy, person.bbox[3] + padY * 2);

                    // On dessine juste ce joueur sur notre canvas caché
                    cropCanvas.width = cw;
                    cropCanvas.height = ch;
                    cropCtx.drawImage(context.image, cx, cy, cw, ch, 0, 0, cw, ch);

                    // ÉTAPE 3 : Trouver le squelette sur cette image zoomée
                    const poses = await this.poseDetector.estimatePoses(cropCanvas, { flipHorizontal: false });
                    
                    let groundX, groundY;
                    let torsoColor = [128, 128, 128]; // Couleur neutre par défaut

                    if (poses.length > 0 && poses[0].score > 0.15) {
                        // SUCCÈS : Le modèle a trouvé un squelette !
                        const pose = poses[0];
                        
                        // Fonction pour récupérer le point et le RE-TRANSLATER dans l'image d'origine
                        const getPt = (name) => {
                            let pt = pose.keypoints.find(k => k.name === name);
                            if(pt) return { x: pt.x + cx, y: pt.y + cy, score: pt.score };
                            return null;
                        };

                        const lAnkle = getPt('left_ankle'), rAnkle = getPt('right_ankle');
                        const lKnee = getPt('left_knee'), rKnee = getPt('right_knee');
                        const lHip = getPt('left_hip'), rHip = getPt('right_hip');
                        const lShoulder = getPt('left_shoulder');

                        const conf = 0.2;

                        // Cascade de repli pour trouver le sol
                        if (lAnkle && rAnkle && lAnkle.score > conf && rAnkle.score > conf) {
                            groundX = (lAnkle.x + rAnkle.x) / 2; groundY = (lAnkle.y + rAnkle.y) / 2;
                        } else if (lKnee && rKnee && lKnee.score > conf && rKnee.score > conf) {
                            groundX = (lKnee.x + rKnee.x) / 2; groundY = Math.max(lKnee.y, rKnee.y) + (ch * 0.2);
                        } else if (lHip && rHip && lHip.score > conf && rHip.score > conf) {
                            groundX = (lHip.x + rHip.x) / 2; groundY = Math.max(lHip.y, rHip.y) + (ch * 0.4);
                        } else {
                            groundX = cx + cw / 2; groundY = cy + ch; // Repli Bounding Box
                        }
                        



                        // ==========================================
                        // EXTRACTION DE LA COULEUR DU TORSE (Dynamique & Résiliente)
                        // ==========================================
                        // 1. Trouver le vrai centre du torse (même si de profil)
                        const rShoulder = getPt('right_shoulder');
                        let validPts = 0, sumX = 0, sumY = 0;
                        
                        // On moyenne tous les points du tronc qui ont un bon score
                        [lShoulder, rShoulder, lHip, rHip].forEach(pt => {
                            if (pt && pt.score > 0.15) { sumX += pt.x; sumY += pt.y; validPts++; }
                        });

                        // Par défaut, si l'IA n'a pas vu le tronc, on tape au milieu-haut de la boîte (35% en partant du haut)
                        let torsoCX = cx + cw / 2; 
                        let torsoCY = cy + ch * 0.35; 
                        
                        if (validPts >= 2) {
                            torsoCX = sumX / validPts;
                            torsoCY = sumY / validPts;
                        }

                        // 2. Calcul du "Patch Radius" Dynamique (Proportionnel à la taille du joueur !)
                        // On prend ~8% de la hauteur de la Bounding Box du joueur (ch)
                        // Ex: Joueur 400px (avant-plan) -> patchRadius = 32 -> Carré de 64x64
                        // Ex: Joueur 50px (arrière-plan) -> patchRadius = 4 -> Carré de 8x8
                        const patchRadius = Math.max(3, Math.floor(ch * 0.08)); 

                        if (context.imageData) {
                            let rSum = 0, gSum = 0, bSum = 0, validPixels = 0;
                            
                            // On scanne ce carré dynamique (un pixel sur 2 ou 3 selon la taille pour rester ultra-rapide)
                            const step = patchRadius > 15 ? 3 : (patchRadius > 6 ? 2 : 1);

                            for(let dy = -patchRadius; dy <= patchRadius; dy += step) {
                                for(let dx = -patchRadius; dx <= patchRadius; dx += step) {
                                    const px = Math.floor(torsoCX + dx);
                                    const py = Math.floor(torsoCY + dy);
                                    
                                    if (px >= 0 && px < context.imageData.width && py >= 0 && py < context.imageData.height) {
                                        const idx = (py * context.imageData.width + px) * 4;
                                        rSum += context.imageData.data[idx];
                                        gSum += context.imageData.data[idx+1];
                                        bSum += context.imageData.data[idx+2];
                                        validPixels++;
                                    }
                                }
                            }
                            
                            if (validPixels > 0) {
                                torsoColor = [
                                    Math.round(rSum / validPixels), 
                                    Math.round(gSum / validPixels), 
                                    Math.round(bSum / validPixels)
                                ];
                            }
                        }

                        
                    } else {
                        // ÉCHEC SQUELETTE : Solution de repli absolue !
                        // Si le joueur est trop loin/flou pour avoir un squelette, on utilise la boîte du COCO-SSD !
                        // On prend le centre bas de la Bounding Box.
                        groundX = cx + cw / 2;
                        groundY = cy + ch - padY; 
                    }

                    // --- NOUVEAU : Sauvegarde des données pour le DEBUG VISUEL ---
                    let adjustedKeypoints = [];
                    if (poses.length > 0 && poses[0].score > 0.15) {
                        // On re-translate les points du squelette dans les coordonnées de l'image d'origine
                        adjustedKeypoints = poses[0].keypoints.map(k => ({ x: k.x + cx, y: k.y + cy, score: k.score, name: k.name }));
                    }

                    // Ajout du joueur au contexte avec son objet "debug"
                    context.detectedPlayers.push({
                        photoX: groundX, 
                        photoY: groundY, 
                        color: torsoColor,
                        debug: {
                            bbox: person.bbox, // [x, y, w, h]
                            keypoints: adjustedKeypoints,
                            patch: { 
                                // Sécurité si les variables n'ont pas été définies (échec squelette)
                                x: typeof torsoCX !== 'undefined' ? torsoCX : cx + cw / 2, 
                                y: typeof torsoCY !== 'undefined' ? torsoCY : cy + ch * 0.35, 
                                r: typeof patchRadius !== 'undefined' ? patchRadius : Math.max(3, Math.floor(ch * 0.08))
                            },
                            color: torsoColor
                        }
                    });
                } // <-- Fin de la boucle "for (let person of persons)"
            }
        };
        

        // --- MODULE 2 : Clustering des Équipes ---
        const TeamClusteringModule = {
            name: "Color Clustering (K-Means en HSV Space)",
            execute: async function(context) {
                if (!context.detectedPlayers || context.detectedPlayers.length === 0) return;
                
                // On passe les données au KMeans qui gère maintenant le HSV en interne
                const result = KMeans.cluster(context.detectedPlayers, 2);
                
                context.detectedPlayers.forEach((player, i) => {
                    player.team = result.assignments[i] === 0 ? 'A' : 'B';
                });
            }
        };

        // Enregistrement des modules dans le Pipeline
        AIPipeline.modules = []; // On nettoie au cas où
        AIPipeline.addModule(TopDownPoseModule);
        AIPipeline.addModule(TeamClusteringModule);

        // --- Déclenchement du Pipeline IA ---
        document.getElementById('modeAutoBtn').addEventListener('click', async () => {
            if (!state.image) return alert("Veuillez d'abord charger une photo !");
            if (!state.transforms.photoToMap) return alert("Veuillez d'abord calibrer vos 6 repères pour que l'IA puisse projeter les joueurs sur la carte 2D !");

            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Analyse en cours...";

            try {
                // Création du contexte de travail pour le pipeline
                const context = {

                    // On utilise le offscreenData qu'on a déjà généré au chargement de l'image
                    imageData: state.offscreenData, 
                    detectedPlayers: []
                };

                // Exécution asynchrone du pipeline
                await AIPipeline.run(context);

                // Traduction des résultats IA vers l'état de l'application
                if (context.detectedPlayers.length > 0) {
                    if (confirm(`L'IA a détecté ${context.detectedPlayers.length} joueurs. Voulez-vous les ajouter au terrain ? (Cela remplacera les joueurs actuels)`)) {
                        
                        state.playersOnPitch = []; // On nettoie
                        
                        context.detectedPlayers.forEach((p, index) => {

                            state.playersOnPitch.push({
                                id: 'p_ai_' + Date.now() + index,
                                team: p.team, // 'A' ou 'B' trouvé par le Clustering
                                num: '?', // À compléter manuellement par le coach
                                role: 'Auto',
                                photoX: p.photoX, 
                                photoY: p.photoY,
                                offX: 0, offY: -50,
                                debug: p.debug // <--- INDISPENSABLE POUR L'AFFICHAGE !
                            });
                        });

                        
                        setMode('player'); // On bascule en mode Joueur pour voir le résultat
                        requestRender();

                } else {
                    alert("L'IA n'a détecté aucun joueur assez net.");

                alert("Erreur lors de l'exécution de l'IA. Vérifiez la console.");
            } finally {

                btn.disabled = false;

        // ==========================================
        // 6. INTERACTIONS SOURIS/TACTILE
        // ==========================================
        function getPos(e, cvs) { const r = cvs.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

        // --- Auto-collapse de la barre latérale ---
        ui.mainCanvas.addEventListener('pointerdown', () => {

            ui.sidebar.classList.add('-translate-x-full');

        // --- Photo Interactions ---
        function hitTestPhoto(x, y) {
            if (state.mode === 'pan') return null;
            let pts = state.mode === 'calib' ? state.calibPoints : state.playersOnPitch;
            for (let i = pts.length - 1; i >= 0; i--) {
                const pt = pts[i];
                const scT = worldToScreen(pt.photoX, pt.photoY);
                const scL = { x: scT.x + pt.offX, y: scT.y + pt.offY };
                if (Math.abs(x - scL.x) < 40 && Math.abs(y - scL.y) < 15) return { obj: pt, type: 'label', canvas: 'photo' };
                if (Math.hypot(x - scT.x, y - scT.y) < 20) return { obj: pt, type: 'target', canvas: 'photo' };
            }
            return null;
        }

        function applyZoom(factor, centerX, centerY) {
            const wX = (centerX - state.view.x) / state.view.zoom;
            const wY = (centerY - state.view.y) / state.view.zoom;
            state.view.zoom = Math.min(Math.max(state.view.zoom * factor, 0.1), 10);
            state.view.x = centerX - wX * state.view.zoom;
            state.view.y = centerY - wY * state.view.zoom;
            requestRender();
        }
