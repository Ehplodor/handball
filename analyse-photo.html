                    title.innerText = "Nouveau Repère";
                    cInputs.classList.remove('hidden');
                    document.getElementById('editLabel').value = "";
                    addModalBtn(actions, "➕ Créer le repère", "bg-indigo-600 hover:bg-indigo-500 text-white", () => {
                        state.calibPoints.push({
                            id: 'c' + Date.now(), label: document.getElementById('editLabel').value || "Point",
                            photoX: worldPos.x, photoY: worldPos.y, mapX: 10, mapY: 10, mapZ: 0, offX: 0, offY: -40
                        });
                        state.raytraceDirty = true;
                        closeModal();
                    });
                } else {
                    modal.style.display = 'none'; // Pas de modal dans les autres modes
                }
            }
        });

        function addModalBtn(container, text, classes, onClick) {
            const btn = document.createElement('button');
            btn.className = `modal-btn ${classes}`;
            btn.innerHTML = text;
            btn.onclick = onClick;
            container.appendChild(btn);
        }

        function closeModal() {
            modal.style.display = 'none';
            requestRender();
        }

        // Fermer le modal si on clique ailleurs sur le canvas
        ui.mainCanvas.addEventListener('pointerdown', () => {
            if (modal.style.display === 'block') closeModal();
        });


        const getMapLogicPos = (pos) => {
            const dpr = window.devicePixelRatio || 1;
            const cw = ui.mapCanvas.width / dpr, ch = ui.mapCanvas.height / dpr;
            const size = Math.min(cw, ch), scale = size / 20;
            const cx = (cw - size) / 2, cy = (ch - size) / 2;
            let logicX = (pos.x - cx - state.mapView.x) / (state.mapView.zoom * scale);
            let logicY = (pos.y - cy - state.mapView.y) / (state.mapView.zoom * scale);
            if (state.isMapFlipped) { logicX = 20 - logicX; logicY = 20 - logicY; }
            return { x: logicX, y: logicY };
        };

        ui.mainCanvas.addEventListener('pointerdown', e => {
            state.pointersPhoto.set(e.pointerId, e);
            const pos = getPos(e, ui.mainCanvas);

            // --- NOUVEAU : Gestion du clic en mode Ballon ---
            if (state.mode === 'ball' && state.pointersPhoto.size === 1) {
                const worldPos = screenToWorld(pos.x, pos.y);
                state.ball = { photoX: worldPos.x, photoY: worldPos.y };
                state.ballCarrier = null; // Réinitialise le porteur
                
                // Vérifier si le ballon a été posé sur un joueur (rayon de 30px)
                for (let p of state.playersOnPitch) {
                    const scT = worldToScreen(p.photoX, p.photoY);
                    if (Math.hypot(pos.x - scT.x, pos.y - scT.y) < 30) {
                        state.ballCarrier = p.id; // Ce joueur devient le porteur !
                        break;
                    }
                }
                requestRender();
                return; // On arrête là pour ne pas déclencher le drag
            }

            if (state.pointersPhoto.size === 1) {
                const hit = hitTestPhoto(pos.x, pos.y);
                if (hit) {
                    ui.mainCanvas.setPointerCapture(e.pointerId);
                    state.dragPhoto = { ...hit, sX: pos.x, sY: pos.y, sWX: hit.obj.photoX, sWY: hit.obj.photoY, sOX: hit.obj.offX, sOY: hit.obj.offY };
                    requestRender();
                }
            }
        });


        ui.mainCanvas.addEventListener('pointermove', e => {
            if (!state.pointersPhoto.has(e.pointerId)) return;
            const prev = state.pointersPhoto.get(e.pointerId);
            state.pointersPhoto.set(e.pointerId, e);
            const pos = getPos(e, ui.mainCanvas);

            if (state.dragPhoto && state.pointersPhoto.size === 1) {
                const dx = pos.x - state.dragPhoto.sX, dy = pos.y - state.dragPhoto.sY;
                if (state.dragPhoto.type === 'target') {
                    state.dragPhoto.obj.photoX = state.dragPhoto.sWX + dx / state.view.zoom;
                    state.dragPhoto.obj.photoY = state.dragPhoto.sWY + dy / state.view.zoom;
                    state.raytraceDirty = true; 
                } else {
                    state.dragPhoto.obj.offX = state.dragPhoto.sOX + dx; state.dragPhoto.obj.offY = state.dragPhoto.sOY + dy;
                }
                requestRender();
            } else if (!state.dragPhoto && state.pointersPhoto.size === 1) {
                state.view.x += e.clientX - prev.clientX; state.view.y += e.clientY - prev.clientY; requestRender();
            } else if (state.pointersPhoto.size === 2) {
                const pts = Array.from(state.pointersPhoto.values());
                const p1 = pts[0], p2 = pts[1];
                const prevP1 = p1.pointerId === e.pointerId ? prev : p1;
                const prevP2 = p2.pointerId === e.pointerId ? prev : p2;

                const prevDist = Math.hypot(prevP1.clientX - prevP2.clientX, prevP1.clientY - prevP2.clientY);
                const curDist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);

                if (prevDist > 0) {
                    const rect = ui.mainCanvas.getBoundingClientRect();
                    applyZoom(curDist / prevDist, (p1.clientX + p2.clientX) / 2 - rect.left, (p1.clientY + p2.clientY) / 2 - rect.top);
                }

                state.view.x += (p1.clientX + p2.clientX) / 2 - (prevP1.clientX + prevP2.clientX) / 2;
                state.view.y += (p1.clientY + p2.clientY) / 2 - (prevP1.clientY + prevP2.clientY) / 2;
                requestRender();
            }
        });

        const endPhoto = e => { state.pointersPhoto.delete(e.pointerId); if(state.pointersPhoto.size===0) state.dragPhoto = null; requestRender(); };
        ['pointerup', 'pointercancel', 'pointerleave'].forEach(evt => ui.mainCanvas.addEventListener(evt, endPhoto));
        ui.mainCanvas.addEventListener('wheel', e => { e.preventDefault(); applyZoom(e.deltaY > 0 ? 0.9 : 1.1, getPos(e, ui.mainCanvas).x, getPos(e, ui.mainCanvas).y); }, { passive: false });

        // --- Map Interactions ---
        function hitTestMap(x, y) {
            if (state.mode === 'pan') return null;
            // CORRECTION DPR: On utilise la taille logique (CSS) pour coller avec les coordonnées de la souris
            const dpr = window.devicePixelRatio || 1;
            const cw = ui.mapCanvas.width / dpr, ch = ui.mapCanvas.height / dpr;
            const size = Math.min(cw, ch), scale = size / 20;
            const cx = (cw - size) / 2, cy = (ch - size) / 2;

            let logicX = (x - cx - state.mapView.x) / (state.mapView.zoom * scale);
            let logicY = (y - cy - state.mapView.y) / (state.mapView.zoom * scale);
            if (state.isMapFlipped) { logicX = 20 - logicX; logicY = 20 - logicY; }
            
            const tol = 15 / (state.mapView.zoom * scale); 

            if (state.mode === 'calib') {
                for (let p of state.calibPoints) { if (Math.hypot(p.mapX - logicX, p.mapY - logicY) < tol) return { obj: p, type: 'calibMap' }; }
            } else if (state.mode === 'player') {
                for (let p of state.playersOnPitch) {
                    if(!state.transforms.photoToMap) continue;
                    let mPos = state.transforms.photoToMap(p.photoX, p.photoY);
                    if(mPos && Math.hypot(mPos.x - logicX, mPos.y - logicY) < tol) return { obj: p, type: 'playerMap' };
                }
            }
            return null;
        }

        function applyMapZoom(factor, centerX, centerY) {
            const wX = (centerX - state.mapView.x) / state.mapView.zoom;
            const wY = (centerY - state.mapView.y) / state.mapView.zoom;
            state.mapView.zoom = Math.min(Math.max(state.mapView.zoom * factor, 0.5), 10);
            state.mapView.x = centerX - wX * state.mapView.zoom;
            state.mapView.y = centerY - wY * state.mapView.zoom;
            requestRender();
        }

        ui.mapCanvas.addEventListener('pointerdown', e => {
            state.pointersMap.set(e.pointerId, e);
            const pos = getPos(e, ui.mapCanvas);
            
            // --- NOUVEAU : Création ou Édition de Courbe ---
            const isDrawMode = state.mode === 'drawRun' || state.mode === 'drawPass';
            const lPos = getMapLogicPos(pos);

            if (isDrawMode && state.pointersMap.size === 1) {
                ui.mapCanvas.setPointerCapture(e.pointerId);
                
                // CORRECTION DPR: Calcul de la distance d'accroche
                const dpr = window.devicePixelRatio || 1;
                const cw = ui.mapCanvas.width / dpr, ch = ui.mapCanvas.height / dpr;
                const size = Math.min(cw, ch), scale = size / 20;
                const hitDist = 20 / (state.mapView.zoom * scale); 
                
                // 1. Essayer d'attraper une poignée existante (Hit Test)
                state.dragPathHandle = null;
                for (let i = state.trajectories.length - 1; i >= 0; i--) {
                    const t = state.trajectories[i];
                    // Priorité à la courbure centrale (p1) si les points sont proches
                    if (Math.hypot(lPos.x - t.p1.x, lPos.y - t.p1.y) < hitDist) { state.dragPathHandle = { t, pt: 'p1' }; break; }
                    if (Math.hypot(lPos.x - t.p2.x, lPos.y - t.p2.y) < hitDist) { state.dragPathHandle = { t, pt: 'p2' }; break; }
                    if (Math.hypot(lPos.x - t.p0.x, lPos.y - t.p0.y) < hitDist) { state.dragPathHandle = { t, pt: 'p0' }; break; }
                }

                // 2. Si on n'a rien attrapé, on CRÉE une nouvelle trajectoire
                if (!state.dragPathHandle) {
                
                    const type = state.mode === 'drawPass' ? 'pass' : 'run';
                    const color = type === 'pass' ? '#facc15' : '#38bdf8'; // Jaune = Passe, Bleu = Course
                    state.currentPath = {
                        id: 't' + Date.now(), type: type, color: color,
                        p0: { x: lPos.x, y: lPos.y },
                        p1: { x: lPos.x, y: lPos.y }, // Au début, p1 est confondu avec le départ
                        p2: { x: lPos.x, y: lPos.y }
                    };
                }
                requestRender();
                return;
            }


            if (!isDrawMode && state.pointersMap.size === 1) {
                const pos = getPos(e, ui.mapCanvas);
                const hit = hitTestMap(pos.x, pos.y);
                if (hit) { ui.mapCanvas.setPointerCapture(e.pointerId); state.dragMap = hit; requestRender(); }
            }
        });

        ui.mapCanvas.addEventListener('pointermove', e => {
            if (!state.pointersMap.has(e.pointerId)) return;
            const prev = state.pointersMap.get(e.pointerId);
            state.pointersMap.set(e.pointerId, e);
            const pos = getPos(e, ui.mapCanvas);
            const isDrawMode = state.mode === 'drawRun' || state.mode === 'drawPass';


            // --- NOUVEAU : Suivi de la souris pour la courbe ---
            if (isDrawMode && state.pointersMap.size === 1) {
                const lPos = getMapLogicPos(pos);
                
                if (state.dragPathHandle) {
                    // Modification a posteriori (on déplace p0, p1 ou p2)
                    state.dragPathHandle.t[state.dragPathHandle.pt] = { x: lPos.x, y: lPos.y };
                } else if (state.currentPath) {
                    // Création en cours : p2 suit la souris, p1 reste exactement au milieu (droite parfaite)
                    state.currentPath.p2 = { x: lPos.x, y: lPos.y };
                    state.currentPath.p1 = { 
                        x: (state.currentPath.p0.x + state.currentPath.p2.x) / 2, 
                        y: (state.currentPath.p0.y + state.currentPath.p2.y) / 2 
                    };
                }
                requestRender();
                return;
            }
            
            if (state.dragMap && state.pointersMap.size === 1) {
                const dpr = window.devicePixelRatio || 1;
                const cw = ui.mapCanvas.width / dpr, ch = ui.mapCanvas.height / dpr;
                const size = Math.min(cw, ch), scale = size / 20;
                const cx = (cw - size) / 2, cy = (ch - size) / 2;
                
                let logicX = (pos.x - cx - state.mapView.x) / (state.mapView.zoom * scale);
                let logicY = (pos.y - cy - state.mapView.y) / (state.mapView.zoom * scale);
                if (state.isMapFlipped) { logicX = 20 - logicX; logicY = 20 - logicY; }

                if (state.dragMap.type === 'calibMap') {
                    state.dragMap.obj.mapX = logicX; state.dragMap.obj.mapY = logicY;
                    state.raytraceDirty = true; 
                } else if (state.dragMap.type === 'playerMap' && state.transforms.mapToPhoto) {
                    let photoPos = state.transforms.mapToPhoto(logicX, logicY);
                    if (photoPos) { state.dragMap.obj.photoX = photoPos.x; state.dragMap.obj.photoY = photoPos.y; }
                }
                requestRender();
            } else if (!state.dragMap && state.pointersMap.size === 1) {
                state.mapView.x += e.clientX - prev.clientX; state.mapView.y += e.clientY - prev.clientY; requestRender();
            } else if (state.pointersMap.size === 2) {
                const pts = Array.from(state.pointersMap.values());
                const p1 = pts[0], p2 = pts[1];
                const prevP1 = p1.pointerId === e.pointerId ? prev : p1;
                const prevP2 = p2.pointerId === e.pointerId ? prev : p2;

                const prevDist = Math.hypot(prevP1.clientX - prevP2.clientX, prevP1.clientY - prevP2.clientY);
                const curDist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);

                if (prevDist > 0) {
                    const rect = ui.mapCanvas.getBoundingClientRect();
                    applyMapZoom(curDist / prevDist, (p1.clientX + p2.clientX) / 2 - rect.left, (p1.clientY + p2.clientY) / 2 - rect.top);
                }

                state.mapView.x += (p1.clientX + p2.clientX) / 2 - (prevP1.clientX + prevP2.clientX) / 2;
                state.mapView.y += (p1.clientY + p2.clientY) / 2 - (prevP1.clientY + prevP2.clientY) / 2;
                requestRender();
            }
        });

        const endMap = e => { 
            state.pointersMap.delete(e.pointerId); 
            if(state.pointersMap.size === 0) {
                state.dragMap = null;
                state.dragPathHandle = null;
                
                // Valider la nouvelle trajectoire (si elle est assez longue)
                if (state.currentPath) {
                    if (Math.hypot(state.currentPath.p0.x - state.currentPath.p2.x, state.currentPath.p0.y - state.currentPath.p2.y) > 0.5) {
                        state.trajectories.push(state.currentPath);
                    }
                    state.currentPath = null;
                }
            }
            requestRender(); 
        };
        // const endMap = e => { state.pointersMap.delete(e.pointerId); if(state.pointersMap.size===0) state.dragMap = null; requestRender(); };
        ['pointerup', 'pointercancel', 'pointerleave'].forEach(evt => ui.mapCanvas.addEventListener(evt, endMap));
        ui.mapCanvas.addEventListener('wheel', e => { e.preventDefault(); const pos = getPos(e, ui.mapCanvas); applyMapZoom(e.deltaY > 0 ? 0.9 : 1.1, pos.x, pos.y); }, { passive: false });
        
        // ==========================================
        // 7. GESTION DE PROJET (SAUVEGARDER / CHARGER / PDF)
        // ==========================================

        // --- Sauvegarder un Projet (.json) ---
        document.getElementById('saveProjectBtn').addEventListener('click', () => {
            if (!state.image) return alert("Veuillez d'abord charger une image et créer une analyse.");
            
            // Convertir l'image d'origine en base64 pour l'inclure dans le fichier
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = state.image.naturalWidth;
            tempCanvas.height = state.image.naturalHeight;
            tempCanvas.getContext('2d').drawImage(state.image, 0, 0);
            const base64Image = tempCanvas.toDataURL('image/jpeg', 0.85); // 85% de qualité pour limiter la taille

            const projectData = {
                version: "11.0",
                image: base64Image,
                teams: state.teams,
                visibleSports: state.visibleSports,
                calibPoints: state.calibPoints.map(p => ({...p})), // Clone
                playersOnPitch: state.playersOnPitch.map(p => ({...p})), // Clone
                view: state.view,
                mapView: state.mapView
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `Analyse_Tactique_${new Date().getTime()}.json`);
            dlAnchorElem.click();
        });

        // --- Charger un Projet (.json) ---
        document.getElementById('loadProjectInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    const data = JSON.parse(event.target.result);
                    
                    // Restaurer les données métier
                    state.teams = data.teams || state.teams;

                    // --- NOUVEAU : On force le rafraichissement du HTML latéral
                    buildRoster('A', 'rosterA');
                    buildRoster('B', 'rosterB');

                    state.visibleSports = data.visibleSports || state.visibleSports;
                    state.calibPoints = data.calibPoints || state.calibPoints;
                    state.playersOnPitch = data.playersOnPitch || state.playersOnPitch;
                    state.view = data.view || state.view;
                    state.mapView = data.mapView || state.mapView;

                    // Mettre à jour l'UI des filtres de sport
                    ['hand', 'basket', 'volley', 'minihand', 'minibasket'].forEach(sport => {
                        const el = document.getElementById(`chk${sport.charAt(0).toUpperCase() + sport.slice(1)}`);
                        if(el) el.checked = state.visibleSports[sport];
                    });

                    // Mettre à jour l'UI des équipes
                    document.getElementById('nameTeamA').value = state.teams.A.name;
                    document.getElementById('colorTeamA').value = state.teams.A.color;
                    document.getElementById('nameTeamB').value = state.teams.B.name;
                    document.getElementById('colorTeamB').value = state.teams.B.color;

                    // Restaurer l'image
                    const img = new Image();
                    img.onload = () => {
                        state.image = img;
                        
                        // Recalculer le Offscreen pour le Raytracing
                        const offCanvas = document.createElement('canvas');
                        const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
                        const maxDim = 800; 
                        const offScale = Math.min(maxDim / img.naturalWidth, maxDim / img.naturalHeight, 1);
                        offCanvas.width = img.naturalWidth * offScale;
                        offCanvas.height = img.naturalHeight * offScale;
                        offCtx.drawImage(img, 0, 0, offCanvas.width, offCanvas.height);
                        state.offscreenData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
                        state.offscreenScale = offScale;

                        state.raytraceDirty = true;
                        updateTransforms();
                        requestRender();
                        alert("Projet chargé avec succès !");
                    };
                    img.src = data.image;

                } catch (err) {
                    alert("Erreur: Fichier de projet invalide ou corrompu.");
                    console.error(err);
                }
                // Réinitialiser l'input
                e.target.value = '';
            };
            reader.readAsText(file);
        });


        // --- Exporter en PDF A4 (Gabarit Croisé & Canvas Virtuels 100% Fiables) ---
        document.getElementById('exportPdfBtn').addEventListener('click', async () => {
            if (!state.image) return alert("Veuillez d'abord charger une image et créer une analyse.");
            if (!window.jspdf) return alert("La librairie PDF est en cours de chargement. Veuillez patienter.");

            // 1. TECHNIQUE DES CANVAS VIRTUELS (Évite les conflits de DPR et CSS)
            const dpr = window.devicePixelRatio || 1;
            
            // Sauvegarde des références DOM originales
            const origMain = ui.mainCanvas;
            const origCtx = ui.ctx;
            const origMap = ui.mapCanvas;
            const origMapCtx = ui.mapCtx;
            
            // Création des canvas fantômes (non attachés au DOM = inviolables)
            const vMain = document.createElement('canvas');
            const vCtx = vMain.getContext('2d');
            const vMap = document.createElement('canvas');
            const vMapCtx = vMap.getContext('2d');
            
            // Résolution fixe (1024px) avec compensation parfaite du DPR
            const exportWidth = 1024;
            const exportScale = exportWidth / state.image.naturalWidth;
            
            vMain.width = exportWidth * dpr;
            vMain.height = state.image.naturalHeight * exportScale * dpr;
            vMap.width = 800 * dpr;
            vMap.height = 800 * dpr;
            
            // Infiltration temporaire dans l'objet UI pour tromper renderAll()
            ui.mainCanvas = vMain;
            ui.ctx = vCtx;
            ui.mapCanvas = vMap;
            ui.mapCtx = vMapCtx;
            
            // Sauvegarde de l'état interactif
            const oldView = { ...state.view };
            const oldMapView = { ...state.mapView };
            
            // Cadrage parfait (zéro pan, zoom adéquat)
            state.view = { x: 0, y: 0, zoom: exportScale };
            state.mapView = { x: 0, y: 0, zoom: 1 };
            
            // Rendu silencieux sur les canvas virtuels
            renderAll();
            
            // Extraction des images nettes et proportionnées
            const mainImgData = vMain.toDataURL('image/jpeg', 0.95);
            const mapImgData = vMap.toDataURL('image/jpeg', 0.95);
            
            // Restauration immédiate de l'application (l'utilisateur ne voit aucun clignotement)
            ui.mainCanvas = origMain;
            ui.ctx = origCtx;
            ui.mapCanvas = origMap;
            ui.mapCtx = origMapCtx;
            state.view = oldView;
            state.mapView = oldMapView;
            
            requestRender(); // Remet l'écran à jour

            // ==========================================
            // 2. GÉNÉRATION DU PDF (Layout Adaptatif Optimisé)
            // ==========================================
            const { jsPDF } = window.jspdf;
            
            const isPhotoPortrait = state.image.naturalHeight > state.image.naturalWidth;
            const pdfOrientation = isPhotoPortrait ? 'l' : 'p';
            const doc = new jsPDF(pdfOrientation, 'mm', 'a4'); 
            
            // --- EN-TÊTE ---
            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(30, 41, 59);
            doc.text(`Analyse Tactique : ${state.teams.A.name} vs ${state.teams.B.name}`, 15, 20);
            
            doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(100, 116, 139);
            doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR')}`, 15, 26);
            
            doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.5);
            doc.line(15, 30, isPhotoPortrait ? 282 : 195, 30);

            // --- MOTEUR DE MISE EN PAGE RÉACTIF ---
            const imgRatio = state.image.naturalHeight / state.image.naturalWidth;
            let photoX, photoY, photoW, photoH;
            let mapX, mapY, mapSize;
            let listX, listY;
            let rightSectionW; // Largeur de la zone de droite allouée à la map et la liste

            if (isPhotoPortrait) {
                // --- GABARIT PAYSAGE (Photo à G, Map GÉANTE en H à D, Liste 4 Col en B à D) ---
                const maxPhotoH = 160; 
                const maxPhotoW = 140; // On laisse pas mal de place à droite

                photoH = maxPhotoH; photoW = photoH / imgRatio;
                if (photoW > maxPhotoW) { photoW = maxPhotoW; photoH = photoW * imgRatio; }

                photoX = 15; photoY = 35 + (maxPhotoH - photoH) / 2;

                const rightSectionX = photoX + photoW + 10;
                rightSectionW = (297 - 15) - rightSectionX;
                
                // On réserve ~35mm de hauteur en bas pour les 4 colonnes de la liste
                const maxMapH = maxPhotoH - 35; 
                
                // La minimap prend le maximum d'espace possible dans ce rectangle
                mapSize = Math.min(rightSectionW, maxMapH);
                
                // Centrage horizontal de la map dans sa zone droite
                mapX = rightSectionX + (rightSectionW - mapSize) / 2;
                mapY = 35; 

                listX = rightSectionX; // La liste démarre alignée à gauche de la zone droite
                listY = mapY + mapSize + 8; // Juste sous la minimap
            } else {
                // --- GABARIT PORTRAIT (Photo en H, Map en B à G, Liste 1 Colonne en B à D) ---
                const maxPhotoW = 180; 
                const maxPhotoH = 155; 
                const listWidthPortrait = 45;
                
                photoW = maxPhotoW; photoH = photoW * imgRatio;
                if (photoH > maxPhotoH) { photoH = maxPhotoH; photoW = photoH / imgRatio; }
                
                photoX = 15 + (maxPhotoW - photoW) / 2; photoY = 35;
                
                const availableH = 297 - 10 - (photoY + photoH + 8); 
                mapSize = Math.min(maxPhotoW - listWidthPortrait - 5, availableH);
                
                mapX = 15; mapY = photoY + photoH + 8;
                listX = mapX + mapSize + 8; listY = mapY;
            }

            // --- DESSIN DES CADRES ET IMAGES ---
            doc.setDrawColor(148, 163, 184); doc.setLineWidth(0.3);
            doc.rect(photoX, photoY, photoW, photoH);
            doc.addImage(mainImgData, 'JPEG', photoX, photoY, photoW, photoH);

            doc.rect(mapX, mapY, mapSize, mapSize);
            doc.addImage(mapImgData, 'JPEG', mapX, mapY, mapSize, mapSize);

            // --- STATISTIQUES ET ROSTER ---
            doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(30, 41, 59);
            const passes = state.trajectories.filter(t => t.type === 'pass').length;
            const courses = state.trajectories.filter(t => t.type === 'run').length;
            
            doc.text(`Analyse : ${passes} Passe(s) | ${courses} Course(s)`, listX, listY);
            
            let startY = listY + 8;
            const teamA_players = state.playersOnPitch.filter(p => p.team === 'A');
            const teamB_players = state.playersOnPitch.filter(p => p.team === 'B');

            if (isPhotoPortrait) {
                // ==========================================
                // MODE 4 COLONNES (Export Paysage - Sous la minimap)
                // ==========================================
                // On divise l'espace droit disponible en 4 parts égales
                const colW = rightSectionW / 4; 
                const col1X = listX;
                const col2X = listX + colW;
                const col3X = listX + colW * 2; 
                const col4X = listX + colW * 3;

                doc.setFontSize(10);
                
                // ÉQUIPE A (Colonnes 1 et 2)
                doc.setFont("helvetica", "bold"); doc.setTextColor(state.teams.A.color);
                doc.text(state.teams.A.name, col1X, startY);
                let cyA1 = startY + 5, cyA2 = startY + 5;
                doc.setFont("helvetica", "normal"); doc.setFontSize(8.5);
                
                if (teamA_players.length === 0) doc.text("- Aucun -", col1X, cyA1);
                teamA_players.forEach((p, idx) => {
                    // Alternance entre la colonne 1 et 2
                    if (idx % 2 === 0) { doc.text(`• #${p.num} - ${p.role.substring(0,10)}`, col1X, cyA1); cyA1 += 4.5; } 
                    else { doc.text(`• #${p.num} - ${p.role.substring(0,10)}`, col2X, cyA2); cyA2 += 4.5; }
                });

                // ÉQUIPE B (Colonnes 3 et 4)
                doc.setFont("helvetica", "bold"); doc.setTextColor(state.teams.B.color); doc.setFontSize(10);
                doc.text(state.teams.B.name, col3X, startY);
                let cyB1 = startY + 5, cyB2 = startY + 5;
                doc.setFont("helvetica", "normal"); doc.setFontSize(8.5);
                
                if (teamB_players.length === 0) doc.text("- Aucun -", col3X, cyB1);
                teamB_players.forEach((p, idx) => {
                    // Alternance entre la colonne 3 et 4
                    if (idx % 2 === 0) { doc.text(`• #${p.num} - ${p.role.substring(0,10)}`, col3X, cyB1); cyB1 += 4.5; } 
                    else { doc.text(`• #${p.num} - ${p.role.substring(0,10)}`, col4X, cyB2); cyB2 += 4.5; }
                });

            } else {
                // ==========================================
                // MODE 1 COLONNE (Export Portrait - À côté de la minimap)
                // ==========================================
                let currentY = startY;

                // ÉQUIPE A
                doc.setFont("helvetica", "bold"); doc.setTextColor(state.teams.A.color); doc.setFontSize(10);
                doc.text(state.teams.A.name, listX, currentY); currentY += 5; 
                doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                
                if (teamA_players.length === 0) { doc.text("- Aucun -", listX, currentY); currentY += 5; } 
                else { teamA_players.forEach(p => { doc.text(`• #${p.num} - ${p.role}`, listX, currentY); currentY += 4.5; }); }

                currentY += 3;

                // ÉQUIPE B
                doc.setFont("helvetica", "bold"); doc.setTextColor(state.teams.B.color); doc.setFontSize(10);
                doc.text(state.teams.B.name, listX, currentY); currentY += 5; 
                doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                
                if (teamB_players.length === 0) { doc.text("- Aucun -", listX, currentY); currentY += 5; } 
                else { teamB_players.forEach(p => { doc.text(`• #${p.num} - ${p.role}`, listX, currentY); currentY += 4.5; }); }
            }

            // Lancer le téléchargement
            doc.save(`Analyse_Tactique_${state.teams.A.name}_vs_${state.teams.B.name}.pdf`);
        });

        
    </script>
</body>
</html>
